<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <link rel="stylesheet" href="video-player.css">
</head>
<body>
    <header>
    <h1>Video Player</h1></header>
    <div class="video-container">
    <video controls  preload="none" id="video-player"></video></div>
    <footer>
        <a href="videos.html">Back Home</a>
    </footer>
    <script>
        const videoPlayer = document.getElementById('video-player');
        const urlParams = new URLSearchParams(window.location.search);
        const videoSrc = urlParams.get('video');

        if (videoSrc) {
            videoPlayer.src = videoSrc;
            videoPlayer.load();
            videoPlayer.play();
        } else {
            // Handle case where no video parameter is provided.
            alert('No video selected.');
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
    <script>
        const { Client } = Appwrite;
        const client = new Client();
    
    client
        .setEndpoint('https://cloud.appwrite.io/v1')
        .setProject('654e1e78768f34eac437');
    </script>
</body>
</html>
